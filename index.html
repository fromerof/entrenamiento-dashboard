<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planillas Alumnos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@400;700;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:     #0b0c0e;
  --bg2:    #111215;
  --bg3:    #17181c;
  --bg4:    #1e1f24;
  --bg5:    #26272e;
  --border: rgba(255,255,255,0.06);
  --bord2:  rgba(255,255,255,0.11);
  --text:   #ebebeb;
  --muted:  #7a7b85;
  --muted2: #4a4b55;
  --lime:   #c9f43c;
  --orange: #ff8c42;
  --blue:   #5eb0ff;
  --purple: #b06cff;
  --teal:   #4dffc3;
  --pink:   #ff6cac;
  --yellow: #ffd166;
  --red:    #ff5c5c;
  --r:      10px;
  --r2:     16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;display:flex;}

/* SIDEBAR */
#sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
.sb-logo{padding:20px 14px 14px;border-bottom:1px solid var(--border);}
.sb-label{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.18em;color:var(--lime);text-transform:uppercase;}
.sb-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;line-height:1.15;margin-top:5px;}
.sb-status{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:background .3s;}
.status-dot.ok{background:var(--lime);}
.status-dot.err{background:var(--red);}
.status-dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border);}
.sb-search input{width:100%;background:var(--bg3);border:1px solid var(--bord2);border-radius:var(--r);padding:7px 10px;font-size:11px;color:var(--text);font-family:'DM Mono',monospace;outline:none;transition:border-color .15s;}
.sb-search input:focus{border-color:var(--lime);}
.sb-search input:disabled{opacity:.4;}
.sb-refresh{padding:6px 10px;border-bottom:1px solid var(--border);}
.btn-refresh{width:100%;padding:6px;background:transparent;border:1px solid var(--bord2);border-radius:var(--r);color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
.btn-refresh:hover{border-color:var(--lime);color:var(--lime);}
.btn-refresh:disabled{opacity:.3;cursor:not-allowed;}
.sb-list{overflow-y:auto;flex:1;padding:4px 0;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
.pat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;transition:all .12s;border-left:2px solid transparent;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.01em;}
.pat-row:hover{background:var(--bg3);color:var(--text);}
.pat-row.active{background:var(--bg3);color:var(--lime);border-left-color:var(--lime);}
.pat-badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;background:var(--bg4);color:var(--muted2);}
.pat-row.active .pat-badge{background:rgba(201,244,60,.12);color:var(--lime);}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;}
#main::-webkit-scrollbar{width:4px;}
#main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}

/* STATES */
.state-center{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.state-icon{font-size:36px;opacity:.25;}
.state-text{font-size:13px;}
.state-sub{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;}
.spinner{width:28px;height:28px;border:2px solid var(--bg4);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 0;gap:12px;flex-wrap:wrap;}
.pat-name{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;line-height:1;letter-spacing:-.01em;}
.week-tabs{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.wtab{padding:5px 13px;font-size:10px;font-weight:600;border-radius:20px;border:1px solid var(--bord2);cursor:pointer;transition:all .12s;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;background:transparent;}
.wtab:hover{border-color:var(--lime);color:var(--lime);}
.wtab.active{background:var(--lime);border-color:var(--lime);color:#0b0c0e;font-weight:700;}
.wtab-new{padding:5px 11px;font-size:10px;font-weight:700;border-radius:20px;border:1px dashed var(--muted2);cursor:pointer;transition:all .15s;color:var(--muted2);font-family:'DM Mono',monospace;letter-spacing:.06em;background:transparent;margin-left:4px;}
.wtab-new:hover{border-color:var(--teal);color:var(--teal);}

/* BANNER */
#zonaBanner{margin:10px 28px 0;}
.banner{padding:10px 14px;border-radius:var(--r);font-size:11px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.banner.info{background:rgba(94,176,255,.08);border:1px solid rgba(94,176,255,.2);color:var(--blue);}
.banner.ok  {background:rgba(77,255,195,.08);border:1px solid rgba(77,255,195,.2);color:var(--teal);}
.banner.err {background:rgba(255,92,92,.1);  border:1px solid rgba(255,92,92,.25);color:#ff8c8c;}
.banner-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;transition:all .12s;border:1px solid;}
.banner-btn.lime{background:rgba(201,244,60,.1);border-color:var(--lime);color:var(--lime);}
.banner-btn.lime:hover{background:var(--lime);color:#0b0c0e;}
.banner-btn.lime:disabled{opacity:.4;cursor:not-allowed;}
.banner-btn.ghost{background:transparent;border-color:var(--muted2);color:var(--muted);}
.banner-btn.ghost:hover{border-color:var(--text);color:var(--text);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px 28px 0;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--lime));opacity:.6;}
.stat-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:8px;}
.stat-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;line-height:1;}
.stat-unit{font-size:10px;font-weight:400;color:var(--muted);margin-left:3px;font-family:'DM Mono',monospace;}

/* CHARTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 28px 0;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;}
.card-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:14px;}
.chart-wrap{position:relative;width:100%;height:240px;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:5px;transition:all .12s;border:1px solid transparent;user-select:none;}
.leg-item:hover{border-color:var(--bord2);color:var(--text);}
.leg-item.inactive{opacity:.3;}
.leg-item.active-cat{border-color:var(--bord2);color:var(--text);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.progress-wrap{padding:0 28px 0;}
.prog-wrap{position:relative;width:100%;height:200px;}

/* TABLE */
.table-wrap{padding:14px 28px 32px;}
.day-block{margin-bottom:18px;}
.day-hdr{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--lime);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:0;display:flex;align-items:center;gap:8px;}
.day-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{padding:7px 10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);text-align:left;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--bg3);}
tbody tr.es-tiempo{opacity:.75;}
td{padding:8px 10px;}
td.mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
td.vol{font-family:'DM Mono',monospace;font-size:10px;color:var(--lime);font-weight:500;}
td.carga-td{font-family:'DM Mono',monospace;font-size:10px;color:var(--orange);font-weight:500;}
td.dash{color:var(--muted2);font-family:'DM Mono',monospace;font-size:10px;}
td.tiempo-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--teal);}
.tipo-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.u-medida-pill{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-family:'DM Mono',monospace;background:rgba(77,255,195,.08);color:var(--teal);border:1px solid rgba(77,255,195,.15);}


/* ── TARJETA BIENESTAR ───────────────────────────────────────── */
.bien-card{
  margin:10px 28px 0;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
}
.bien-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;cursor:pointer;user-select:none;
  transition:background .12s;
}
.bien-card-header:hover{background:var(--bg3);}
.bien-card-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);}
.bien-toggle{font-size:9px;color:var(--muted2);font-family:'DM Mono',monospace;transition:transform .2s;}
.bien-toggle.open{transform:rotate(180deg);}
.bien-card-body{padding:10px 18px 14px;border-top:1px solid var(--border);}
.bien-card-inner{display:flex;align-items:center;gap:0;}
.bien-meta-col{min-width:130px;margin-right:16px;}
.bien-card-sub{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted2);}
.bien-grid{display:flex;gap:12px;flex:1;overflow-x:auto;}
.bien-day-col{display:flex;flex-direction:column;gap:4px;min-width:44px;}
.bien-day-label{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted2);text-align:center;margin-bottom:2px;font-weight:700;letter-spacing:.08em;}
.bien-cell{
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:3px 6px;border-radius:5px;background:var(--bg3);
}
.bien-cell-icon{font-size:10px;opacity:.7;}
.bien-cell-val{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;min-width:12px;text-align:right;}
.bien-empty{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;padding:2px 0;}
/* Tabs del card derecho */
.chart-tabs{display:flex;gap:4px;margin-bottom:12px;}
.ctab{
  padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:.06em;
  font-family:'DM Mono',monospace;border-radius:12px;cursor:pointer;
  border:1px solid var(--bord2);color:var(--muted);background:transparent;
  transition:all .12s;
}
.ctab:hover{border-color:var(--lime);color:var(--lime);}
.ctab.active{background:var(--lime);border-color:var(--lime);color:#0b0c0e;}
/* ── FORMULARIO BIENESTAR ────────────────────────────────────── */
.form-view{padding:24px 28px 40px;}
.form-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.btn-back{background:transparent;border:1px solid var(--bord2);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;transition:all .12s;}
.btn-back:hover{border-color:var(--text);color:var(--text);}
.form-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;}
.form-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}

/* Chips de progreso por día */
.dias-status{display:flex;gap:6px;margin-bottom:16px;}
.dia-chip{padding:3px 10px;border-radius:12px;font-size:9px;font-family:'DM Mono',monospace;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);transition:all .2s;}
.dia-chip.parcial {background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.25);color:var(--yellow);}
.dia-chip.completo{background:rgba(77,255,195,.1); border-color:rgba(77,255,195,.3); color:var(--teal);}

/* Tabla de bienestar */
.bien-table{width:100%;border-collapse:collapse;}
.bien-table th{padding:8px 16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);font-family:'DM Mono',monospace;text-align:center;border-bottom:1px solid var(--border);}
.bien-table th:first-child{text-align:left;min-width:200px;}
.bien-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.bien-table tbody tr:last-child{border-bottom:none;}
.bien-table tbody tr:hover{background:var(--bg3);}
.bien-table td{padding:10px 16px;vertical-align:middle;}
.metrica-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;}
.metrica-icon{font-size:15px;}
.rating-group{display:flex;gap:4px;justify-content:center;}
.rating-btn{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--bord2);background:transparent;
  color:var(--muted2);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:700;
  transition:all .1s;
}
.rating-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--bord2);}

.form-footer{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.form-msg{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);}

/* ── MÓDULO EVALUACIONES ─────────────────────────────────────────── */
.eval-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 28px; margin-top:14px; }
.eval-radar-wrap { position:relative; width:100%; height:300px; }
.btn-eval { padding:5px 13px; font-size:10px; font-weight:700; border-radius:20px; border:1px solid var(--purple); cursor:pointer; transition:all .12s; color:var(--purple); font-family:'DM Mono',monospace; letter-spacing:.06em; background:transparent; margin-left:8px; }
.btn-eval:hover { background:var(--purple); color:#0b0c0e; }
.autocomplete-wrap { position:relative; }
.autocomplete-list { position:absolute; top:100%; left:0; right:0; background:var(--bg3); border:1px solid var(--bord2); border-radius:var(--r); z-index:100; max-height:180px; overflow-y:auto; }
.autocomplete-item { padding:7px 10px; font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
.autocomplete-item:hover { background:var(--bg4); color:var(--text); }
.autocomplete-item:last-child { border-bottom:none; }
.eval-ex-row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:var(--r); background:var(--bg3); border:1px solid var(--border); margin-bottom:5px; }
.eval-ex-name { font-size:10px; font-weight:500; flex:1; }
.eval-ex-del { background:transparent; border:none; color:var(--muted2); cursor:pointer; font-size:16px; line-height:1; padding:0 2px; transition:color .1s; }
.eval-ex-del:hover { color:var(--red); }

/* ── TABLA EDITABLE EJERCICIOS ───────────────────────────────────── */
.dia-tabs { display:flex; gap:5px; margin-bottom:14px; }
.dia-tab { padding:5px 14px; font-size:10px; font-weight:700; border-radius:20px; border:1px solid var(--bord2); cursor:pointer; transition:all .12s; color:var(--muted); font-family:'DM Mono',monospace; background:transparent; }
.dia-tab:hover { border-color:var(--lime); color:var(--lime); }
.dia-tab.active { background:var(--lime); border-color:var(--lime); color:#0b0c0e; }
.ej-table { width:100%; border-collapse:collapse; font-size:11px; }
.ej-table th { padding:6px 8px; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--muted2); text-align:left; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; }
.ej-table td { padding:4px 4px; border-bottom:1px solid var(--border); vertical-align:middle; }
.ej-input { width:100%; background:transparent; border:1px solid transparent; border-radius:6px; padding:5px 7px; font-size:11px; color:var(--text); font-family:'DM Mono',monospace; outline:none; transition:all .12s; }
.ej-input:focus { background:var(--bg3); border-color:var(--bord2); }
.ej-input:hover { background:var(--bg3); }
.ej-select { width:100%; background:transparent; border:1px solid transparent; border-radius:6px; padding:5px 4px; font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; outline:none; cursor:pointer; transition:all .12s; }
.ej-select:focus, .ej-select:hover { background:var(--bg3); border-color:var(--bord2); color:var(--text); }
.ej-ac-wrap { position:relative; }
.ej-ac-list { position:absolute; top:100%; left:0; min-width:260px; background:var(--bg3); border:1px solid var(--bord2); border-radius:var(--r); z-index:200; max-height:160px; overflow-y:auto; box-shadow:0 4px 20px rgba(0,0,0,.4); }
.ej-ac-item { padding:6px 10px; font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; display:flex; justify-content:space-between; align-items:center; }
.ej-ac-item:hover { background:var(--bg4); color:var(--text); }
.btn-add-ej { width:100%; padding:7px; background:transparent; border:1px dashed var(--muted2); border-radius:var(--r); color:var(--muted2); font-size:10px; font-family:'DM Mono',monospace; cursor:pointer; transition:all .15s; margin-top:6px; }
.btn-add-ej:hover { border-color:var(--lime); color:var(--lime); }
.unsaved-dot { width:6px; height:6px; border-radius:50%; background:var(--yellow); display:inline-block; margin-left:5px; vertical-align:middle; }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  html, body { overflow: hidden; }

  /* Sidebar como drawer */
  #sidebar {
    position: fixed;
    left: -200px;
    top: 0;
    height: 100vh;
    z-index: 1000;
    transition: left .25s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,.5);
  }
  #sidebar.open { left: 0; }

  /* Overlay cuando sidebar abierto */
  #sb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 999;
  }
  #sb-overlay.open { display: block; }

  /* Botón hamburguesa */
  #btn-menu {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 998;
    width: 36px;
    height: 36px;
    background: var(--bg2);
    border: 1px solid var(--bord2);
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
  }

  /* Main ocupa todo el ancho */
  #main { width: 100%; padding-top: 0; }

  /* Header */
  .top-bar { padding: 56px 14px 0; gap: 8px; }
  .pat-name { font-size: 20px; }
  .week-tabs { gap: 4px; }
  .wtab { padding: 4px 10px; font-size: 9px; }

  /* Banner */
  #zonaBanner { margin: 8px 14px 0; }

  /* Stats: 2 columnas */
  .stats-row {
    grid-template-columns: 1fr 1fr;
    padding: 12px 14px 0;
    gap: 8px;
  }
  .stat { padding: 12px 12px; }
  .stat-val { font-size: 16px; }

  /* Grids: 1 columna */
  .grid-2 { grid-template-columns: 1fr; padding: 10px 14px 0; gap: 10px; }
  .eval-grid { grid-template-columns: 1fr; padding: 0 14px; }

  /* Charts más pequeños */
  .chart-wrap { height: 180px; }
  .prog-wrap { height: 160px; }
  .eval-radar-wrap { height: 240px; }

  /* Progress */
  .progress-wrap { padding: 0 14px; }

  /* Table */
  .table-wrap { padding: 10px 14px 24px; }
  table { font-size: 10px; }
  thead th { padding: 5px 6px; font-size: 8px; }
  tbody td { padding: 5px 6px; }

  /* Forms */
  .form-view { padding: 0; }
  .form-header { padding: 56px 14px 14px; }

  /* Tabla editable */

  .ej-table th { font-size: 8px; padding: 5px 4px; }

  /* Evaluaciones */

  .eval-grid .card:last-child  { order: 1; } /* form arriba */
}

@media (max-width: 400px) {

}
</style>
</head>
<body>
<div id="sb-overlay" onclick="toggleMenu()"></div>
<button id="btn-menu" onclick="toggleMenu()">☰</button>
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-label">Training</div>
    <div class="sb-title">Planillas<br>Alumnos</div>
    <div class="sb-status">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </div>
  <div class="sb-refresh">
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()" disabled>↻ Actualizar</button>
  </div>
  <div class="sb-search">
    <input type="text" id="srch" placeholder="Buscar alumno..." oninput="filterList(this.value)" disabled>
  </div>
  <div class="sb-list" id="sbList"></div>
</div>

<div id="main">
  <div id="content">
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-text">Cargando datos...</div>
      <div class="state-sub">Conectando con Google Sheets</div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQuqVlPXZJ8OmLemxsXqHO8N_uL_nFsxglwgXc5NAKVFwClkMr3LO8RIYTCpDnrTj1vQ/exec';

const CAT_COLOR = {
  'EMPUJE':       '#ff8c42',
  'TRACCION':     '#5eb0ff',
  'DOM. RODILLA': '#c9f43c',
  'DOM. CADERA':  '#b06cff',
  'POTENCIA':     '#ffd166',
  'ACCESORIO':    '#ff6cac',
  'MOVILIDAD':    '#4dffc3',
  'GLUTEO':       '#ffb347',
  'METABOLICO':   '#ff5c5c',
  'SIN CATEGORÍA':'#555',
};
const ALL_CATS = Object.keys(CAT_COLOR);

// Colores para botones 1→5: rojo, naranja, amarillo, lima, teal
const RATING_COLORS = ['#ff5c5c','#ff8c42','#ffd166','#c9f43c','#4dffc3'];

const METRICAS = [
  { key:'sueno',  label:'Calidad del sueño',        icon:'😴' },
  { key:'estres', label:'Estrés',                    icon:'🧠' },
  { key:'dolor',  label:'Dolor muscular/articular',  icon:'💪' },
  { key:'animo',  label:'Ánimo',                     icon:'⚡' },
  { key:'ganas',  label:'Ganas de entrenar',         icon:'🔥' },
];
const DIAS_BIEN = [1,2,3,4];

let DATA    = null;
let DATA_IDS = {};
let curPat  = null;
let curWeek = 1;
let charts  = {};

// ─── JSONP ───────────────────────────────────────────────────────
function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
      clearTimeout(timeout);
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => { cleanup(); reject(new Error('Script load error')); };
    document.body.appendChild(script);
  });
}

// ─── CARGA ───────────────────────────────────────────────────────
async function loadData() {
  setStatus('loading','Cargando...');
  document.getElementById('btnRefresh').disabled = true;
  document.getElementById('srch').disabled = true;

  try {
    const raw = await fetchJSONP(APPS_SCRIPT_URL);
    DATA = {}; DATA_IDS = {};

    Object.entries(raw).forEach(([pat, val]) => {
      const esNuevo  = val && !Array.isArray(val) && Array.isArray(val.semanas);
      const rawWeeks = esNuevo ? val.semanas : (Array.isArray(val) ? val : []);
      DATA_IDS[pat]  = esNuevo ? val.id : null;
      DATA[pat] = rawWeeks.map(w => ({
        week:      w.week      ?? w.semana,
        sesionId:  w.sesionId  ?? null,
        mesociclo: w.mesociclo ?? 1,
        vol:       w.vol       ?? w.volByCat   ?? {},
        carga:     w.carga     ?? w.cargaByCat ?? {},
        ser:       w.ser       ?? w.seriesByCat ?? {},
        exercises: (w.exercises ?? w.exList ?? []).filter(e => e.ejercicio),
        bienestar: w.bienestar ?? null,
      }));
    });

    setStatus('ok', `${Object.keys(DATA).length} alumnos`);
    document.getElementById('btnRefresh').disabled = false;
    document.getElementById('srch').disabled = false;
    buildList();
    if (curPat && DATA[curPat]) render();
    else showWelcome();

  } catch(err) {
    setStatus('err','Error de conexión');
    document.getElementById('btnRefresh').disabled = false;
    document.getElementById('content').innerHTML = `
      <div class="state-center">
        <div class="state-icon">⚠</div>
        <div class="state-text">No se pudo conectar</div>
        <div class="state-sub">${err.message}</div>
      </div>`;
    console.error(err);
  }
}

function setStatus(type, text) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = text;
}
function showWelcome() {
  document.getElementById('content').innerHTML = `
    <div class="state-center">
      <div class="state-icon">🏋️</div>
      <div class="state-text">Selecciona un alumno</div>
    </div>`;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────
function buildList(filter='') {
  if (!DATA) return;
  const el = document.getElementById('sbList');
  el.innerHTML = '';
  const fl = filter.toLowerCase();
  Object.keys(DATA).forEach(name => {
    if (fl && !name.toLowerCase().includes(fl)) return;
    const d = document.createElement('div');
    d.className = 'pat-row' + (name === curPat ? ' active' : '');
    d.innerHTML = `<span>${name.trim()}</span><span class="pat-badge">${DATA[name].length}S</span>`;
    d.onclick = () => selectPat(name);
    el.appendChild(d);
  });
}
function filterList(v) { buildList(v); }
function selectPat(name) {
  curPat = name; curWeek = DATA[name][0].week;
  buildList(document.getElementById('srch').value);
  render();
}
function selectWeek(w) { curWeek = w; render(); }

// ─── NUEVA SEMANA ─────────────────────────────────────────────────
// IMPORTANTE: crearSemana() NO llama al servidor todavía.
// Solo muestra las opciones en el banner. La sesión se crea recién
// cuando el usuario elige una opción explícitamente.
// Esto evita semanas vacías creadas por clicks accidentales.
function crearSemana(n) {
  const alumnoId = DATA_IDS[curPat];
  if (!alumnoId) { alert('Actualiza Apps Script para habilitar escritura.'); return; }

  const prevWk  = (DATA[curPat]||[]).find(w => w.week === n-1);
  const hayPrev = prevWk && prevWk.sesionId;

  let html = '<div class="banner info">Nueva semana S'+n+' — ¿cómo empezar?&nbsp;&nbsp;';
  if (hayPrev) {
    html += '<button class="banner-btn lime" onclick="crearYCopiar('+alumnoId+','+prevWk.sesionId+','+n+')">Copiar S'+(n-1)+'</button>';
  }
  html += '<button class="banner-btn ghost" onclick="crearVacia('+alumnoId+','+n+')">Semana vacía</button>';
  html += '&nbsp;<button class="banner-btn ghost" onclick="setBanner(\'\')" style="padding:4px 8px">✕</button>';
  html += '</div>';
  setBanner(html);
}

// Opción 1: crear sesión + copiar ejercicios de la semana anterior
// Inyecta la semana nueva en DATA local para que render() la encuentre
// sin necesitar loadData(). Los ejercicios y bienestar empiezan vacíos.
function _inyectarSemana(sesionId, week) {
  if (!DATA[curPat]) return;
  const yaExiste = DATA[curPat].some(w => w.week === week);
  if (yaExiste) return;
  DATA[curPat].push({
    week, sesionId, mesociclo: 1,
    vol: {}, carga: {}, ser: {},
    exercises: [], bienestar: null,
  });
  // Ordenar por semana
  DATA[curPat].sort((a, b) => a.week - b.week);
}

async function crearYCopiar(alumnoId, sesionOrigen, newWeek) {
  setBanner('<div class="banner info"><div class="spinner" style="width:14px;height:14px;border-width:1.5px"></div><span>Creando S'+newWeek+' y copiando ejercicios...</span></div>');
  try {
    const r1 = await fetchJSONP(APPS_SCRIPT_URL+'?action=nuevaSesion&alumnoId='+alumnoId+'&semana='+newWeek);
    if (r1.error && !r1.sesionId) { setBanner('<div class="banner err">⚠ '+r1.error+'</div>'); return; }
    const newSesionId = r1.sesionId;

    const r2 = await fetchJSONP(APPS_SCRIPT_URL+'?action=copiarSemana&sesionOrigen='+sesionOrigen+'&sesionDestino='+newSesionId);
    if (r2.error) { setBanner('<div class="banner err">⚠ '+r2.error+'</div>'); return; }

    _inyectarSemana(newSesionId, newWeek);
    curWeek = newWeek;
    setBanner('<div class="banner ok">✓ '+(r2.copiados||0)+' ejercicios copiados desde S'+(newWeek-1)+'</div>');
    irAFormulario(newSesionId, newWeek);
  } catch(e) { setBanner('<div class="banner err">⚠ '+e.message+'</div>'); }
}

// Opción 2: crear sesión vacía
async function crearVacia(alumnoId, newWeek) {
  setBanner('<div class="banner info"><div class="spinner" style="width:14px;height:14px;border-width:1.5px"></div><span>Creando S'+newWeek+'...</span></div>');
  try {
    const r = await fetchJSONP(APPS_SCRIPT_URL+'?action=nuevaSesion&alumnoId='+alumnoId+'&semana='+newWeek);
    if (r.error && !r.sesionId) { setBanner('<div class="banner err">⚠ '+r.error+'</div>'); return; }
    _inyectarSemana(r.sesionId, newWeek);
    curWeek = newWeek;
    irAFormulario(r.sesionId, newWeek);
  } catch(e) { setBanner('<div class="banner err">⚠ '+e.message+'</div>'); }
}

function setBanner(html) {
  const el = document.getElementById('zonaBanner');
  if (el) el.innerHTML = html;
}

// ─── FORMULARIO BIENESTAR ─────────────────────────────────────────
// Se muestra al crear una semana nueva, antes de los ejercicios.
// Estado: window._bienState = { d1:{sueno:null,...}, d2:{...}, ... }

// irAFormulario: primero selecciona el día, luego muestra la grilla de ese día
// Esto evita rellenar días futuros que aún no pasaron.
// window._bienState persiste entre días para poder registrar día 1, luego día 2, etc.

function irAFormulario(sesionId, week) {
  destroyCharts();

  // Inicializar estado completo si no existe aún para esta sesión
  if (!window._bienState || window._bienSesionId !== sesionId) {
    window._bienState    = {};
    window._bienSesionId = sesionId;
    DIAS_BIEN.forEach(d => {
      window._bienState['d'+d] = {};
      METRICAS.forEach(m => window._bienState['d'+d][m.key] = null);
    });
  }

  // Chips de días — muestra cuáles ya tienen datos guardados
  const diaChips = DIAS_BIEN.map(d => {
    const state   = window._bienState['d'+d];
    const llenos  = METRICAS.filter(m => state[m.key] !== null).length;
    const cls     = llenos === 0 ? '' : llenos === METRICAS.length ? ' completo' : ' parcial';
    return `<button class="dia-chip${cls}" onclick="_seleccionarDia(${sesionId},${week},${d})"
      style="cursor:pointer;border:none">Día ${d}</button>`;
  }).join('');

const hayDatosGuardados = DIAS_BIEN.some(d => {
  const state = window._bienState['d'+d];
  return METRICAS.some(m => state[m.key] !== null);
});
  
  document.getElementById('content').innerHTML = `
    <div class="form-view">
      <div class="form-header">
        <button class="btn-back" onclick="render()">← Volver</button>
        <div>
          <div class="form-title">${curPat.trim()}</div>
          <div class="form-sub">Bienestar — Semana ${week} · sesión #${sesionId}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">
          ¿Para qué día registras bienestar?
          <span style="color:var(--muted2);font-size:8px;font-weight:400;text-transform:none;letter-spacing:0;margin-left:8px">
            Selecciona el día de hoy
          </span>
        </div>
        <div class="dias-status" style="gap:8px;margin-bottom:8px">${diaChips}</div>
        <div style="font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:16px">
          Verde = completo · Amarillo = parcial · Gris = sin datos
        </div>
        <div class="form-footer" style="border-top:none;padding-top:0">
          ${hayDatosGuardados ? 
            `<button class="banner-btn lime" onclick="irATablaEjercicios(${sesionId},${week})">
              Continuar a ejercicios →
            </button>
            <button class="banner-btn ghost" onclick="irATablaEjercicios(${sesionId},${week})">
              Saltar bienestar
            </button>` 
            : 
            `<button class="banner-btn ghost" onclick="irATablaEjercicios(${sesionId},${week})">
              Saltar bienestar
            </button>`
          }
          <span class="form-msg" id="bienMsg"></span>
        </div>
      </div>
    </div>`;
}

// Muestra la grilla de una sola métrica para el día seleccionado
window._seleccionarDia = function(sesionId, week, dia) {
  const filas = METRICAS.map(m => {
    const btns = [1,2,3,4,5].map(v => {
      const actual = window._bienState['d'+dia][m.key];
      const activo = actual === v;
      const col    = RATING_COLORS[v-1];
      const style  = activo
        ? `background:${col}bb;border-color:${col};color:#0b0c0e;`
        : '';
      return `<button class="rating-btn" id="rb_d${dia}_${m.key}_${v}"
        onclick="_setBien(${dia},'${m.key}',${v})"
        style="${style}"
        title="${v}/5">${v}</button>`;
    }).join('');
    return `<tr>
      <td><div class="metrica-label"><span class="metrica-icon">${m.icon}</span>${m.label}</div></td>
      <td><div class="rating-group">${btns}</div></td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="form-view">
      <div class="form-header">
        <button class="btn-back" onclick="irAFormulario(${sesionId},${week})">← Días</button>
        <div>
          <div class="form-title">${curPat.trim()}</div>
          <div class="form-sub">Bienestar — Semana ${week} · Día ${dia}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">
          Día ${dia} — Bienestar
          <span style="color:var(--muted2);font-size:8px;font-weight:400;text-transform:none;letter-spacing:0;margin-left:8px">
            1 (bajo) → 5 (óptimo)
          </span>
        </div>
        <div style="overflow-x:auto">
          <table class="bien-table">
            <thead><tr><th></th><th style="text-align:center">Valor</th></tr></thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
        <div class="form-footer">
          <button class="banner-btn lime" id="btnGuardarBien"
            onclick="_guardarBienestar(${sesionId},${week},${dia})">
            Guardar día ${dia}
          </button>
          <button class="banner-btn ghost" onclick="irAFormulario(${sesionId},${week})">
            ← Volver a días
          </button>
          <span class="form-msg" id="bienMsg"></span>
        </div>
      </div>
    </div>`;
};

// Click en un botón → actualiza estado y repinta
window._setBien = function(dia, metrica, valor) {
  window._bienState['d'+dia][metrica] = valor;
  for (let v = 1; v <= 5; v++) {
    const btn = document.getElementById(`rb_d${dia}_${metrica}_${v}`);
    if (!btn) continue;
    const activo = v === valor;
    const col    = RATING_COLORS[v-1];
    btn.style.background  = activo ? col+'bb' : 'transparent';
    btn.style.borderColor = activo ? col       : 'var(--bord2)';
    btn.style.color       = activo ? '#0b0c0e' : 'var(--muted2)';
  }
};

// Guarda solo el día seleccionado — no borra los otros días ya guardados
window._guardarBienestar = async function(sesionId, week, dia) {
  const btn = document.getElementById('btnGuardarBien');
  const msg = document.getElementById('bienMsg');

  const state   = window._bienState['d'+dia];
  const hayAlgo = METRICAS.some(m => state[m.key] !== null);
  if (!hayAlgo) {
    msg.style.color = 'var(--yellow)';
    msg.textContent = 'Ingresa al menos un valor.';
    return;
  }

  btn.disabled = true;
  msg.style.color = 'var(--muted)';
  msg.textContent = 'Guardando...';

  // Solo envía los params del día seleccionado
  // El servidor hace upsert por sesionId+dia (borra y reinserta ese día)
  let params = '?action=guardarBienestar&sesionId='+sesionId+'&diaUnico='+dia;
  METRICAS.forEach(m => {
    const v = state[m.key];
    if (v !== null) params += '&d'+dia+'_'+m.key+'='+v;
  });

  try {
    const r = await fetchJSONP(APPS_SCRIPT_URL + params);
    if (r.error) {
      msg.style.color = 'var(--red)'; msg.textContent = '⚠ '+r.error;
      btn.disabled = false;
    } else {
      // Actualizar DATA local para que render() refleje el bienestar sin recargar
      const semana = DATA[curPat] && DATA[curPat].find(w => w.sesionId === sesionId);
      if (semana) {
        if (!semana.bienestar) semana.bienestar = {};
        semana.bienestar[dia] = {};
        METRICAS.forEach(m => { semana.bienestar[dia][m.key] = state[m.key]; });
      }
      msg.style.color = 'var(--teal)';
      msg.textContent = '✓ Día '+dia+' guardado';
      setTimeout(() => irAFormulario(sesionId, week), 1000);
    }
  } catch(e) {
    msg.style.color = 'var(--red)'; msg.textContent = '⚠ '+e.message;
    btn.disabled = false;
  }
};

// Placeholder hasta implementar tabla de ejercicios
window._saltarBienestar = function(sesionId, week) {
  irATablaEjercicios(sesionId, week);
};


// ─── TARJETA RESUMEN BIENESTAR (colapsable) ─────────────────────
// bienestar = { 1: {sueno,estres,dolor,animo,ganas}, 2: {...}, ... } | null
// window._bienOpen controla si está expandida
function buildBienestarCard(bienestar) {
  const METRICAS_CARD = [
    { key:'sueno',  icon:'😴' },
    { key:'estres', icon:'🧠' },
    { key:'dolor',  icon:'💪' },
    { key:'animo',  icon:'⚡' },
    { key:'ganas',  icon:'🔥' },
  ];
  const RATING_COLORS = ['#ff5c5c','#ff8c42','#ffd166','#c9f43c','#4dffc3'];

  const hayDatos = bienestar && Object.keys(bienestar).length > 0;
  const isOpen   = window._bienOpen === true;
  const toggleId = 'bienToggle';
  const bodyId   = 'bienBody';

  let bodyHtml = '';
  if (!hayDatos) {
    bodyHtml = `<div class="bien-empty">Sin datos registrados para esta semana</div>`;
  } else {
    const diasConDatos = Object.keys(bienestar).map(Number).sort((a,b)=>a-b);
    const dayCols = diasConDatos.map(dia => {
      const d = bienestar[dia];
      const cells = METRICAS_CARD.map(m => {
        const v = d[m.key];
        if (v === null || v === undefined || v === '')
          return `<div class="bien-cell"><span class="bien-cell-icon">${m.icon}</span><span class="bien-cell-val" style="color:var(--muted2)">—</span></div>`;
        const col = RATING_COLORS[v-1];
        return `<div class="bien-cell" style="background:${col}18;border:1px solid ${col}33">
          <span class="bien-cell-icon">${m.icon}</span>
          <span class="bien-cell-val" style="color:${col}">${v}</span>
        </div>`;
      }).join('');
      return `<div class="bien-day-col"><div class="bien-day-label">D${dia}</div>${cells}</div>`;
    }).join('');
    bodyHtml = `<div class="bien-card-inner">
      <div class="bien-meta-col">
        <div class="bien-card-sub">😴 Sueño · 🧠 Estrés<br>💪 Dolor · ⚡ Ánimo · 🔥 Ganas</div>
      </div>
      <div class="bien-grid">${dayCols}</div>
    </div>`;
  }

  const statusTxt = hayDatos ? '✓ con datos' : 'sin datos';

  return `<div class="bien-card">
    <div class="bien-card-header" onclick="_toggleBien()">
      <span class="bien-card-title">Bienestar <span style="color:var(--muted2);font-weight:400;font-size:8px;letter-spacing:0;text-transform:none;margin-left:6px">${statusTxt}</span></span>
      <span class="bien-toggle${isOpen?' open':''}" id="${toggleId}">▼</span>
    </div>
    <div id="${bodyId}" style="display:${isOpen?'block':'none'}">
      <div class="bien-card-body">${bodyHtml}</div>
    </div>
  </div>`;
}

window._toggleBien = function() {
  window._bienOpen = !window._bienOpen;
  const body   = document.getElementById('bienBody');
  const toggle = document.getElementById('bienToggle');
  if (body)   body.style.display   = window._bienOpen ? 'block' : 'none';
  if (toggle) toggle.className = 'bien-toggle' + (window._bienOpen ? ' open' : '');
};
// ─── RENDER DASHBOARD ─────────────────────────────────────────────
function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

function render() {
  destroyCharts();
  window._radarActive = null;
  window._curChartTab = window._curChartTab || 'vol';
  // No resetear _bienOpen ni _curChartTab — mantener preferencia del usuario entre semanas

  const weeks = DATA[curPat];
  const wd    = weeks.find(w => w.week === curWeek) || weeks[0];
  curWeek     = wd.week;

  const exs        = wd.exercises || [];
  const totalVol   = Object.values(wd.vol).reduce((a,b) => a+b, 0);
  const totalCarga = Object.values(wd.carga).reduce((a,b) => a+b, 0);
  const dias       = new Set(exs.map(e => e.dia)).size;
  const maxWeek    = Math.max(...weeks.map(w => w.week));
  const alumnoId   = DATA_IDS[curPat];

  const tabsHtml = weeks.map(w =>
    `<button class="wtab${w.week===curWeek?' active':''}" onclick="selectWeek(${w.week})">S${w.week}</button>`
  ).join('') +
  (alumnoId
    ? `<button class="wtab-new" onclick="crearSemana(${maxWeek+1})" title="Agregar semana ${maxWeek+1}">+ S${maxWeek+1}</button>`
    : '');

  const progressHtml = weeks.length > 1 ? `
    <div class="progress-wrap">
      <div class="card" style="margin-bottom:0">
        <div class="card-title">Progresión semanal — Vol. efectivo</div>
        <div class="prog-wrap"><canvas id="progC"></canvas></div>
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="top-bar">
      <div class="pat-name">${curPat.trim()}</div>
      <div class="week-tabs">${tabsHtml}</div>
              <button class="btn-eval" onclick="irAEvaluacion(${alumnoId})">⬡ Evaluación</button>
              <button class="btn-eval" onclick="irAFormulario(${wd.sesionId},${curWeek})">♥ Bienestar</button>
    </div>
    <div id="zonaBanner"></div>
    <div class="stats-row">
      <div class="stat" style="--accent:var(--lime)">
        <div class="stat-label">Vol. Efectivo</div>
        <div class="stat-val">${Math.round(totalVol)}<span class="stat-unit">reps</span></div>
      </div>
      <div class="stat" style="--accent:var(--orange)">
        <div class="stat-label">Carga Total</div>
        <div class="stat-val">${Math.round(totalCarga).toLocaleString('es')}<span class="stat-unit">kg</span></div>
      </div>
      <div class="stat" style="--accent:var(--blue)">
        <div class="stat-label">Ejercicios</div>
        <div class="stat-val">${exs.length}</div>
      </div>
      <div class="stat" style="--accent:var(--purple)">
        <div class="stat-label">Días</div>
        <div class="stat-val">${dias}</div>
      </div>
    </div>
    ${buildBienestarCard(wd.bienestar)}
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Balance — Vol. Efectivo <span style="color:var(--muted2);font-size:8px;font-weight:400">(click para filtrar)</span></div>
        <div class="chart-wrap"><canvas id="radarC"></canvas></div>
        <div class="legend" id="radarLeg"></div>
      </div>
      <div class="card">
        <div class="card-title">Resumen por categoría</div>
        <div class="chart-tabs">
          <button class="ctab active" id="ctab-vol"    onclick="_setChartTab('vol')">Volumen</button>
          <button class="ctab"        id="ctab-series" onclick="_setChartTab('series')">Series</button>
          <button class="ctab"        id="ctab-carga"  onclick="_setChartTab('carga')">Carga</button>
          <button class="ctab"        id="ctab-bien"   onclick="_setChartTab('bien')">Bienestar</button>
        </div>
        <div class="chart-wrap"><canvas id="barC"></canvas></div>
      </div>
    </div>
    ${progressHtml}
    <div class="table-wrap">
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>Ejercicios — Semana ${curWeek}</span>
          ${wd.sesionId ? `<button class="banner-btn ghost" style="font-size:9px;padding:4px 10px"
            onclick="irATablaEjercicios(${wd.sesionId},${curWeek})">✎ Editar</button>` : ''}
        </div>
        ${buildTable(exs)}
      </div>
    </div>`;

  renderRadar(wd);
  renderBar(wd);
  // Sincronizar botón activo del tab con estado actual
  ['vol','series','carga','bien'].forEach(t => {
    const btn = document.getElementById('ctab-'+t);
    if (btn) btn.className = 'ctab' + (t === window._curChartTab ? ' active' : '');
  });
  if (weeks.length > 1) renderProgress(weeks);
}

// ─── RADAR CON TOGGLE ────────────────────────────────────────────
function renderRadar(wd) {
  const cats = ALL_CATS.filter(c => wd.vol[c] > 0);
  if (!cats.length) return;

  if (!window._radarActive) {
    window._radarActive = {};
    cats.forEach(c => window._radarActive[c] = true);
  }

  const getDataset = () => cats.map(c => window._radarActive[c] ? (wd.vol[c]||0) : 0);

  charts.radar = new Chart(document.getElementById('radarC'), {
    type: 'radar',
    data: {
      labels: cats,
      datasets: [{
        data: getDataset(),
        backgroundColor: 'rgba(201,244,60,0.1)',
        borderColor: '#c9f43c', borderWidth: 2,
        pointBackgroundColor: cats.map(c => CAT_COLOR[c]),
        pointRadius: 5, pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          ticks: { display: false },
          grid: { color: 'rgba(255,255,255,0.06)' },
          angleLines: { color: 'rgba(255,255,255,0.06)' },
          pointLabels: { font: { size: 9, family: 'Instrument Sans', weight: '600' }, color: '#7a7b85' }
        }
      }
    }
  });

  document.getElementById('radarLeg').innerHTML = cats.map(c => `
    <div class="leg-item ${window._radarActive[c]?'active-cat':'inactive'}"
         onclick="_toggleRadarCat('${c}')">
      <span class="leg-dot" style="background:${CAT_COLOR[c]}"></span>
      <span>${c}: <b style="color:${CAT_COLOR[c]}">${Math.round(wd.vol[c])}</b></span>
    </div>`
  ).join('');

  window._toggleRadarCat = function(cat) {
    window._radarActive[cat] = !window._radarActive[cat];
    charts.radar.data.datasets[0].data = getDataset();
    charts.radar.update();
    document.querySelectorAll('.leg-item').forEach((el,i) => {
      el.className = 'leg-item '+(window._radarActive[cats[i]]?'active-cat':'inactive');
    });
  };
}

// ─── CHART TABS ──────────────────────────────────────────────────
// _curChartTab: 'vol' | 'series' | 'carga' | 'bien'
// Se preserva al cambiar de tab para no resetear al volver

window._setChartTab = function(tab) {
  window._curChartTab = tab;
  // Actualizar clases de botones
  ['vol','series','carga','bien'].forEach(t => {
    const btn = document.getElementById('ctab-' + t);
    if (btn) btn.className = 'ctab' + (t === tab ? ' active' : '');
  });
  // Destruir chart actual y redibujar
  if (charts.bar) { try { charts.bar.destroy(); } catch(e){} delete charts.bar; }
  // Recuperar wd del estado actual
  const wd = (DATA[curPat]||[]).find(w => w.week === curWeek);
  if (wd) renderBar(wd);
};

function renderBar(wd) {
  const tab  = window._curChartTab || 'vol';
  const el   = document.getElementById('barC');
  if (!el) return;

  // ── Tab Bienestar — barras agrupadas por día ──────────────────
  if (tab === 'bien') {
    const bien = wd.bienestar;
    if (!bien || !Object.keys(bien).length) {
      // Sin datos: mostrar canvas vacío con mensaje
      if (charts.bar) { try{charts.bar.destroy();}catch(e){} }
      charts.bar = null;
      el.style.display = 'none';
      // Mostrar mensaje si no existe ya
      let msg = document.getElementById('barNoData');
      if (!msg) {
        msg = document.createElement('div');
        msg.id = 'barNoData';
        msg.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted2);font-size:11px;font-family:DM Mono,monospace;';
        msg.textContent = 'Sin bienestar registrado';
        el.parentNode.appendChild(msg);
      }
      return;
    }
    // Limpiar mensaje si existe
    const msg = document.getElementById('barNoData');
    if (msg) msg.remove();
    el.style.display = '';

    const METRICAS_KEYS = ['sueno','estres','dolor','animo','ganas'];
    const METRICAS_LABELS = ['Sueño','Estrés','Dolor','Ánimo','Ganas'];
    const dias = Object.keys(bien).map(Number).sort((a,b)=>a-b);
    const DIA_COLORS = ['#5eb0ff','#c9f43c','#b06cff','#ff8c42'];

    const datasets = dias.map((dia, i) => ({
      label: 'Día ' + dia,
      data: METRICAS_KEYS.map(k => {
        const v = bien[dia][k];
        return (v === null || v === undefined || v === '') ? 0 : v;
      }),
      backgroundColor: DIA_COLORS[i % DIA_COLORS.length] + '55',
      borderColor:     DIA_COLORS[i % DIA_COLORS.length],
      borderWidth: 1.5, borderRadius: 4,
    }));

    if (charts.bar) { try{charts.bar.destroy();}catch(e){} }
    charts.bar = new Chart(el, {
      type: 'bar',
      data: { labels: METRICAS_LABELS, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, position: 'bottom', labels: { color:'#7a7b85', font:{ size:8, family:'DM Mono' }, boxWidth:8, padding:10 } } },
        scales: {
          x: { ticks:{ color:'#555', font:{ size:8, family:'DM Mono' } }, grid:{ display:false } },
          y: { min:0, max:5, ticks:{ color:'#4a4b55', font:{ size:8, family:'DM Mono' }, stepSize:1 }, grid:{ color:'rgba(255,255,255,0.04)' } }
        }
      }
    });
    return;
  }

  // ── Tabs vol / series / carga — barras por categoría ─────────
  const limpiar = () => { const m = document.getElementById('barNoData'); if (m) m.remove(); el.style.display = ''; };
  limpiar();

  const dataMap = { vol: wd.vol, series: wd.ser, carga: wd.carga };
  const data    = dataMap[tab] || {};
  const cats    = ALL_CATS.filter(c => (data[c]||0) > 0);

  if (!cats.length) {
    if (charts.bar) { try{charts.bar.destroy();}catch(e){} charts.bar = null; }
    el.style.display = 'none';
    let msg = document.getElementById('barNoData');
    if (!msg) {
      msg = document.createElement('div');
      msg.id = 'barNoData';
      msg.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted2);font-size:11px;font-family:DM Mono,monospace;';
      msg.textContent = 'Sin datos';
      el.parentNode.appendChild(msg);
    }
    return;
  }

  const colors = cats.map(c => CAT_COLOR[c]);
  const units  = { vol:'reps', series:'series', carga:'kg' };

  if (charts.bar) { try{charts.bar.destroy();}catch(e){} }
  charts.bar = new Chart(el, {
    type: 'bar',
    data: { labels: cats, datasets: [{ data: cats.map(c=>data[c]||0), backgroundColor: colors.map(c=>c+'33'), borderColor: colors, borderWidth: 1.5, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.raw + ' ' + (units[tab]||'') } }
      },
      scales: {
        x: { ticks:{ color:'#555', font:{ size:8, family:'DM Mono' } }, grid:{ display:false } },
        y: { ticks:{ color:'#4a4b55', font:{ size:8, family:'DM Mono' } }, grid:{ color:'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function renderProgress(weeks) {
  const activeCats = ALL_CATS.filter(c => weeks.some(w => (w.vol[c]||0) > 0)).slice(0,6);
  charts.prog = new Chart(document.getElementById('progC'), {
    type: 'line',
    data: {
      labels: weeks.map(w => `S${w.week}`),
      datasets: activeCats.map(cat => ({
        label: cat, data: weeks.map(w => w.vol[cat]||0),
        borderColor: CAT_COLOR[cat], backgroundColor: CAT_COLOR[cat]+'18',
        borderWidth: 2, pointRadius: 4, pointBackgroundColor: CAT_COLOR[cat], tension: 0.35, fill: false,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, position: 'bottom', labels: { color:'#7a7b85', font:{ size:9, family:'DM Mono' }, boxWidth:8, padding:12, usePointStyle:true } } },
      scales: {
        x: { ticks: { color:'#555', font:{ size:9, family:'DM Mono' } }, grid:{ color:'rgba(255,255,255,0.04)' } },
        y: { ticks: { color:'#4a4b55', font:{ size:9, family:'DM Mono' } }, grid:{ color:'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

// ─── TABLA DE EJERCICIOS ──────────────────────────────────────────
function buildTable(exs) {
  if (!exs.length) return '<div style="padding:30px;text-align:center;color:var(--muted);font-size:12px;">Sin datos</div>';
  const days = [...new Set(exs.map(e=>e.dia))].sort((a,b)=>a-b);
  return days.map(dia => {
    const rows = exs.filter(e=>e.dia===dia).map(ex => {
      const c = CAT_COLOR[ex.tipo]||'#555';
      const esTiempo = String(ex.u_medida||'').toUpperCase() === 'TIEMPO';
      const volCell  = esTiempo
        ? (ex.vol_ef!=null ? `<td class="tiempo-badge">${ex.vol_ef}<span style="font-size:8px;opacity:.6"> seg</span></td>` : `<td class="dash">—</td>`)
        : (ex.vol_ef!=null ? `<td class="vol">${ex.vol_ef}</td>` : `<td class="dash">—</td>`);
      return `<tr${esTiempo?' class="es-tiempo"':''}>
        <td style="font-weight:500;font-size:11px">${ex.ejercicio||'—'}${esTiempo?'&nbsp;<span class="u-medida-pill">TIEMPO</span>':''}</td>
        <td><span class="tipo-pill" style="background:${c}22;color:${c};border:1px solid ${c}44">${ex.tipo}</span></td>
        <td class="mono">${ex.series||'—'}</td>
        <td class="mono">${ex.repet_raw||'—'}</td>
        <td class="mono">${ex.carga_raw||'—'}</td>
        ${volCell}
        <td class="${ex.carga_total!=null?'carga-td':'dash'}">${ex.carga_total!=null?Math.round(ex.carga_total):'—'}</td>
      </tr>`;
    }).join('');
    return `<div class="day-block">
      <div class="day-hdr">Día ${dia}</div>
      <table>
        <thead><tr><th>Ejercicio</th><th>Tipo</th><th>Series</th><th>Reps / Seg</th><th>Carga</th><th>Vol. Ef.</th><th>Carga total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ─── TABLA EDITABLE DE EJERCICIOS ────────────────────────────────

const TIPOS_LIST = ['EMPUJE','TRACCION','DOM. RODILLA','DOM. CADERA',
                    'POTENCIA','ACCESORIO','MOVILIDAD','GLUTEO','METABOLICO','SIN CATEGORÍA'];

let _tablaState    = {};  // { dia: [{id,orden,ejercicio,tipo,series,repet_raw,carga_raw,u_medida}] }
let _tablaCurDia   = 1;
let _tablaSesionId = null;
let _tablaWeek     = null;
let _tablaUnsaved  = false;

async function irATablaEjercicios(sesionId, week) {
  destroyCharts();
  _tablaSesionId = sesionId;
  _tablaWeek     = week;
  _tablaCurDia   = 1;
  _tablaUnsaved  = false;

  // Load exercises from DATA into editable state
  const wd  = (DATA[curPat] || []).find(w => w.sesionId === sesionId);
  const exs = wd ? (wd.exercises || []) : [];

  _tablaState = {};
  [1,2,3,4].forEach(dia => {
    _tablaState[dia] = exs
      .filter(e => e.dia === dia)
      .sort((a,b) => (a.orden||0) - (b.orden||0))
      .map(e => ({ ...e }));
  });

  // Load ejercicios cache if empty
  if (!_ejsCache.length) {
    try {
      const data = await fetchJSONP(APPS_SCRIPT_URL + '?action=getEjercicios');
      _ejsCache = Array.isArray(data) ? data : [];
    } catch(e) { _ejsCache = []; }
  }

  _renderTablaView();
}

function _renderTablaView() {
  const diaTabs = [1,2,3,4].map(d => {
    const count = (_tablaState[d] || []).length;
    return `<button class="dia-tab${d === _tablaCurDia ? ' active' : ''}"
      onclick="_switchDia(${d})">
      Día ${d}
      <span style="font-size:8px;color:${d===_tablaCurDia?'#0b0c0e':'var(--muted2)'};margin-left:4px">${count}</span>
    </button>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="form-view">
      <div class="form-header">
        <button class="btn-back" onclick="_confirmarSalir()">← Volver</button>
        <div>
          <div class="form-title">${curPat.trim()}</div>
          <div class="form-sub">Semana ${_tablaWeek} — Editar ejercicios</div>
        </div>
      </div>
      <div class="card" style="margin:0 0 32px">
        <div class="dia-tabs">${diaTabs}</div>
        <div id="diaTablaContent"></div>
        <div class="form-footer" style="margin-top:14px">
          <button class="banner-btn lime" id="btnGuardarDia"
            onclick="_guardarDia()">
            Guardar Día ${_tablaCurDia}
          </button>
          <span class="form-msg" id="tablaMsg"></span>
          <span id="unsavedIndicator" style="display:none">
            <span class="unsaved-dot"></span>
            <span style="font-size:9px;color:var(--yellow);font-family:'DM Mono',monospace;margin-left:4px">Cambios sin guardar</span>
          </span>
        </div>
      </div>
    </div>`;

  _renderDiaTabla();

  document.addEventListener('click', function _closeAc(e) {
    if (!e.target.closest('.ej-ac-wrap')) {
      document.querySelectorAll('.ej-ac-list').forEach(l => l.style.display = 'none');
    }
  });
}

function _renderDiaTabla() {
  const rows = _tablaState[_tablaCurDia] || [];
  const el   = document.getElementById('diaTablaContent');
  if (!el) return;

  const tiposOptions = TIPOS_LIST.map(t =>
    `<option value="${t}">${t}</option>`
  ).join('');

  const tbody = rows.map((ex, i) => {
    const esT = (ex.u_medida || '').toUpperCase() === 'TIEMPO';
    return `<tr id="ejrow-${i}">
      <td style="min-width:200px">
        <div class="ej-ac-wrap">
          <input class="ej-input" value="${ex.ejercicio || ''}"
            placeholder="Ejercicio..."
            oninput="_ejAcFilter(this,${i})"
            onfocus="_ejAcFilter(this,${i})"
            onchange="_setEjField(${i},'ejercicio',this.value);_markUnsaved()"
            autocomplete="off"/>
          <div class="ej-ac-list" id="ejac-${i}" style="display:none"></div>
        </div>
      </td>
      <td style="min-width:130px">
        <select class="ej-select" onchange="_setEjField(${i},'tipo',this.value);_markUnsaved()">
          ${TIPOS_LIST.map(t => `<option value="${t}"${ex.tipo===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td style="width:60px">
        <input class="ej-input" type="number" min="1" value="${ex.series||''}"
          placeholder="—"
          onchange="_setEjField(${i},'series',this.value);_markUnsaved()"
          style="text-align:center"/>
      </td>
      <td style="width:80px">
        <input class="ej-input" value="${ex.repet_raw||''}"
          placeholder="${esT?'seg':'reps'}"
          onchange="_setEjField(${i},'repet_raw',this.value);_markUnsaved()"
          style="text-align:center"/>
      </td>
      <td style="width:80px">
        <input class="ej-input" value="${ex.carga_raw||''}"
          placeholder="kg / PC"
          onchange="_setEjField(${i},'carga_raw',this.value);_markUnsaved()"
          style="text-align:center"/>
      </td>
      <td style="width:32px;text-align:center">
        <button class="eval-ex-del" onclick="_eliminarFilaEj(${i})">×</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="overflow-x:auto">
      <table class="ej-table">
        <thead><tr>
          <th>Ejercicio</th><th>Tipo</th>
          <th style="text-align:center">Series</th>
          <th style="text-align:center">Reps/Seg</th>
          <th style="text-align:center">Carga</th>
          <th></th>
        </tr></thead>
        <tbody>${tbody || `<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--muted2);font-family:'DM Mono',monospace;font-size:10px">Sin ejercicios — agrega uno abajo</td></tr>`}</tbody>
      </table>
    </div>
    <button class="btn-add-ej" onclick="_agregarFilaEj()">+ Agregar ejercicio</button>`;
}

// ── Field helpers ─────────────────────────────────────────────────
window._setEjField = function(idx, field, value) {
  if (!_tablaState[_tablaCurDia][idx]) return;
  _tablaState[_tablaCurDia][idx][field] = value;
};

window._markUnsaved = function() {
  _tablaUnsaved = true;
  const ind = document.getElementById('unsavedIndicator');
  if (ind) ind.style.display = 'inline-flex';
};

window._agregarFilaEj = function() {
  const rows  = _tablaState[_tablaCurDia] || [];
  const orden = rows.length + 1;
  _tablaState[_tablaCurDia].push({
    id: null, dia: _tablaCurDia, orden,
    ejercicio:'', tipo:'ACCESORIO',
    series:'', repet_raw:'', carga_raw:'',
    u_medida:'REPETICION',
  });
  _markUnsaved();
  _renderDiaTabla();
  // Focus the new exercise input
  const inputs = document.querySelectorAll('.ej-input');
  if (inputs.length) inputs[inputs.length - 5]?.focus();
};

window._eliminarFilaEj = async function(idx) {
  const ex = _tablaState[_tablaCurDia][idx];
  if (ex && ex.id) {
    // Already saved in DB — delete from server
    try {
      await fetchJSONP(APPS_SCRIPT_URL + '?action=eliminarEjercicio&id=' + ex.id);
    } catch(e) {}
  }
  _tablaState[_tablaCurDia].splice(idx, 1);
  // Re-number orden
  _tablaState[_tablaCurDia].forEach((e,i) => e.orden = i + 1);
  _markUnsaved();
  _renderDiaTabla();
};

// ── Autocomplete in table ─────────────────────────────────────────
window._ejAcFilter = function(input, rowIdx) {
  // Remove any existing floating dropdown
  const old = document.getElementById('ej-ac-floating');
  if (old) old.remove();

  const q = (input.value || '').trim().toLowerCase();
  const matches = q.length === 0
    ? _ejsCache.slice(0, 12)
    : _ejsCache.filter(e => e.nombre.toLowerCase().includes(q)).slice(0, 10);

  if (!matches.length) return;

  // Build floating dropdown anchored to input position
  const rect = input.getBoundingClientRect();
  const list = document.createElement('div');
  list.id = 'ej-ac-floating';
  list.className = 'ej-ac-list';
  list.style.cssText = `
    position:fixed;
    top:${rect.bottom + 2}px;
    left:${rect.left}px;
    width:${Math.max(rect.width, 260)}px;
    z-index:9999;
    display:block;
  `;

  list.innerHTML = matches.map(e =>
    `<div class="ej-ac-item"
      onmousedown="event.preventDefault();_ejAcSelect(${rowIdx},'${e.nombre.replace(/'/g,"\\'")}','${e.tipo}','${e.uMedida||'REPETICION'}')">
      <span>${e.nombre}</span>
      <span style="font-size:9px;color:var(--muted2)">${e.tipo||''} · ${e.uMedida||'REP'}</span>
    </div>`
  ).join('');

  document.body.appendChild(list);

  // Close on blur
  input.onblur = () => {
    setTimeout(() => {
      const fl = document.getElementById('ej-ac-floating');
      if (fl) fl.remove();
    }, 150);
  };
};

window._ejAcSelect = function(rowIdx, nombre, tipo, uMedida) {
  if (!_tablaState[_tablaCurDia][rowIdx]) return;
  _tablaState[_tablaCurDia][rowIdx].ejercicio = nombre;
  _tablaState[_tablaCurDia][rowIdx].tipo      = tipo;
  _tablaState[_tablaCurDia][rowIdx].u_medida  = uMedida;
  _markUnsaved();

  // Remove floating dropdown immediately
  const fl = document.getElementById('ej-ac-floating');
  if (fl) fl.remove();

  _renderDiaTabla();
};

// ── Switch day (warn if unsaved) ──────────────────────────────────
window._switchDia = function(dia) {
  if (_tablaUnsaved) {
    if (!confirm(`Tienes cambios sin guardar en Día ${_tablaCurDia}. ¿Guardar antes de continuar?`)) {
      _tablaCurDia = dia;
      _tablaUnsaved = false;
      _renderTablaView();
      return;
    }
    _guardarDia(true).then(() => {
      _tablaCurDia  = dia;
      _tablaUnsaved = false;
      _renderTablaView();
    });
    return;
  }
  _tablaCurDia = dia;
  _renderTablaView();
};

window._confirmarSalir = function() {
  if (_tablaUnsaved) {
    if (!confirm(`Tienes cambios sin guardar en Día ${_tablaCurDia}. ¿Salir sin guardar?`)) return;
  }
  render();
};

// ── Simple vol/carga calculation ──────────────────────────────────
function _calcVolCarga(series, repetRaw, cargaRaw) {
  const s = parseInt(series);
  const r = parseFloat(repetRaw);
  const c = parseFloat(cargaRaw);
  const volEf     = (!isNaN(s) && !isNaN(r)) ? s * r : '';
  const cargaTotal= (!isNaN(s) && !isNaN(r) && !isNaN(c)) ? Math.round(s * r * c) : '';
  return { volEf, cargaTotal };
}

// ── Save day ──────────────────────────────────────────────────────
window._guardarDia = async function(silent = false) {
  const btn = document.getElementById('btnGuardarDia');
  const msg = document.getElementById('tablaMsg');
  const rows = (_tablaState[_tablaCurDia] || []).filter(e => e.ejercicio.trim());

  if (!rows.length) {
    if (!silent && msg) { msg.style.color='var(--yellow)'; msg.textContent='Sin ejercicios para guardar.'; }
    return;
  }

  if (btn) btn.disabled = true;
  if (!silent && msg) { msg.style.color='var(--muted)'; msg.textContent='Guardando...'; }

  let ok = 0;
  for (let i = 0; i < rows.length; i++) {
    const ex     = rows[i];
    const orden  = i + 1;
    ex.orden     = orden;
    const { volEf, cargaTotal } = _calcVolCarga(ex.series, ex.repet_raw, ex.carga_raw);

    const params = [
      'action=guardarEjercicio',
      'sesionId='   + _tablaSesionId,
      'dia='        + _tablaCurDia,
      'orden='      + orden,
      'ejercicio='  + encodeURIComponent(ex.ejercicio),
      'tipo='       + encodeURIComponent(ex.tipo || ''),
      'series='     + (ex.series || ''),
      'repetRaw='   + encodeURIComponent(ex.repet_raw || ''),
      'cargaRaw='   + encodeURIComponent(ex.carga_raw || ''),
      'volEf='      + volEf,
      'cargaTotal=' + cargaTotal,
      'uMedida='    + encodeURIComponent(ex.u_medida || 'REPETICION'),
    ].join('&');

    try {
      const r = await fetchJSONP(APPS_SCRIPT_URL + '?' + params);
      if (r.ok) { ex.id = r.id; ok++; }
    } catch(e) {}
  }

  // Update DATA local so render() reflects changes without reload
  const wd = (DATA[curPat] || []).find(w => w.sesionId === _tablaSesionId);
  if (wd) {
    wd.exercises = wd.exercises.filter(e => e.dia !== _tablaCurDia);
    rows.forEach((ex,i) => wd.exercises.push({ ...ex, dia: _tablaCurDia, orden: i+1 }));
  }

  _tablaUnsaved = false;
  const ind = document.getElementById('unsavedIndicator');
  if (ind) ind.style.display = 'none';

  if (!silent && msg) {
    msg.style.color = 'var(--teal)';
    msg.textContent = `✓ ${ok} ejercicio(s) guardados`;
    if (btn) btn.disabled = false;
    setTimeout(() => { if(msg) msg.textContent=''; }, 3000);
  }
  if (btn) btn.disabled = false;
};

window._filtrarEjercicios = function(query) {
  const list = document.getElementById('evalAutoList');
  if (!list) return;
  const q = query.trim().toLowerCase();
  const matches = q.length === 0
    ? _ejsCache.slice(0, 20)
    : _ejsCache.filter(e => e.nombre.toLowerCase().includes(q)).slice(0, 15);
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(e =>
    `<div class="autocomplete-item"
      onclick="_selEjercicioEval('${e.nombre.replace(/'/g,"\\'")}','${e.uMedida||'REPETICION'}')">
      ${e.nombre}
      <span style="color:var(--muted2);font-size:9px;float:right">${e.uMedida||'REP'}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
};

window._selEjercicioEval = function(nombre, uMedida) {
  const input   = document.getElementById('evalExInput');
  const display = document.getElementById('evalUnidadDisplay');
  const list    = document.getElementById('evalAutoList');
  if (input)   input.value       = nombre;
  if (display) display.textContent = uMedida || 'REPETICION';
  if (list)    list.style.display = 'none';
  window._evalCurUnidad = uMedida || 'REPETICION';

  // Update range defaults based on unit
  const isTiempo = uMedida === 'TIEMPO';
  const std   = document.getElementById('evalStd');
  const elite = document.getElementById('evalElite');
  const pro   = document.getElementById('evalPro');
  if (std && elite && pro) {
    std.value   = isTiempo ? 60  : 10;
    elite.value = isTiempo ? 90  : 15;
    pro.value   = isTiempo ? 120 : 20;
  }

  // Show/hide seg/min selector
  const timeUnit = document.getElementById('evalTimeUnit');
  if (timeUnit) timeUnit.style.display = isTiempo ? 'flex' : 'none';

  document.getElementById('evalValor')?.focus();
};

window._setTimeUnit = function(unit) {
  window._evalTimeUnit = unit;
  const btnSeg = document.getElementById('btnSeg');
  const btnMin = document.getElementById('btnMin');
  if (!btnSeg || !btnMin) return;
  if (unit === 'seg') {
    btnSeg.style.background = 'var(--lime)'; btnSeg.style.color = '#0b0c0e'; btnSeg.style.borderColor = 'var(--lime)';
    btnMin.style.background = 'transparent'; btnMin.style.color = 'var(--muted)'; btnMin.style.borderColor = 'var(--bord2)';
  } else {
    btnMin.style.background = 'var(--lime)'; btnMin.style.color = '#0b0c0e'; btnMin.style.borderColor = 'var(--lime)';
    btnSeg.style.background = 'transparent'; btnSeg.style.color = 'var(--muted)'; btnSeg.style.borderColor = 'var(--bord2)';
  }
};
window._evalTimeUnit = 'seg'; // default
  
// ── Agregar / eliminar ────────────────────────────────────────────
window._agregarEjercicioEval = function() {
  const nombre = (document.getElementById('evalExInput')?.value || '').trim();
  let valor = parseFloat(document.getElementById('evalValor')?.value);
  // Convert minutes to seconds for consistency in DB
  if (window._evalCurUnidad === 'TIEMPO' && window._evalTimeUnit === 'min') valor = valor * 60;
  const std    = parseFloat(document.getElementById('evalStd')?.value)   || 10;
  const elite  = parseFloat(document.getElementById('evalElite')?.value) || 15;
  const pro    = parseFloat(document.getElementById('evalPro')?.value)   || 20;
  const mayorMejor = document.getElementById('evalMayorMejor')?.checked !== false;
  const unidad = window._evalCurUnidad || 'REPETICION';

  if (!nombre)                        { _evalMsg('Selecciona un ejercicio'); return; }
  if (isNaN(valor) || valor < 0)      { _evalMsg('Ingresa un valor válido'); return; }
  if (std >= elite || elite >= pro)   { _evalMsg('Los rangos deben ir: Standard < Elite < Pro'); return; }

  _evalEjs.push({ ejercicio:nombre, unidad, valor, rangoStandard:std, rangoElite:elite, rangoPro:pro, mayorEsMejor:mayorMejor });
  _renderEvalView(DATA_IDS[curPat]);
};

window._eliminarEjercicioEval = function(idx) {
  _evalEjs.splice(idx, 1);
  _renderEvalView(DATA_IDS[curPat]);
};

function _evalMsg(txt) {
  const el = document.getElementById('evalMsg');
  if (el) { el.style.color = 'var(--yellow)'; el.textContent = txt; }
}

// ── Normalización 0-100 (Standard=33, Elite=66, Pro=100) ─────────
function _normalizarValor(valor, std, elite, pro, mayorEsMejor) {
  if (!std || !elite || !pro) return null;
  if (mayorEsMejor) {
    if (valor >= pro)   return 100;
    if (valor >= elite) return 66 + 34 * (valor - elite) / (pro - elite);
    if (valor >= std)   return 33 + 33 * (valor - std)   / (elite - std);
    return Math.max(0, 33 * valor / std);
  } else {
    if (valor <= pro)   return 100;
    if (valor <= elite) return 66 + 34 * (elite - valor) / (elite - pro);
    if (valor <= std)   return 33 + 33 * (std - valor)   / (std - elite);
    return Math.max(0, 33 * std / valor);
  }
}

// ── Radar ─────────────────────────────────────────────────────────
function _renderEvalRadar() {
  const canvas = document.getElementById('evalRadarC');
  if (!canvas) return;
  if (charts.evalRadar) { try { charts.evalRadar.destroy(); } catch(e){} delete charts.evalRadar; }

  if (!_evalEjs.length) return; // canvas queda en blanco

  const n      = _evalEjs.length;
  const labels = _evalEjs.map(e => e.ejercicio.length > 13 ? e.ejercicio.slice(0,12)+'…' : e.ejercicio);
  const scores = _evalEjs.map(e => _normalizarValor(e.valor, e.rangoStandard, e.rangoElite, e.rangoPro, e.mayorEsMejor) ?? 0);
  const ref    = (v) => new Array(n).fill(v);

  charts.evalRadar = new Chart(canvas, {
    type: 'radar',
    data: {
      labels,
      datasets: [
        { label:'Pro',      data:ref(100), borderColor:'rgba(255,140,66,.4)',  borderWidth:1.5, borderDash:[5,4], backgroundColor:'transparent', pointRadius:0 },
        { label:'Elite',    data:ref(66),  borderColor:'rgba(94,176,255,.4)', borderWidth:1.5, borderDash:[5,4], backgroundColor:'transparent', pointRadius:0 },
        { label:'Standard', data:ref(33),  borderColor:'rgba(201,244,60,.4)', borderWidth:1.5, borderDash:[5,4], backgroundColor:'transparent', pointRadius:0 },
        {
          label:'Alumno', data:scores,
          backgroundColor:'rgba(201,244,60,0.10)',
          borderColor:'#c9f43c', borderWidth:2,
          pointBackgroundColor: scores.map(s => s>=100?'#ff8c42':s>=66?'#5eb0ff':s>=33?'#c9f43c':'#ff5c5c'),
          pointRadius:5, pointHoverRadius:7,
        }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { display:false },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label !== 'Alumno') return null;
              const ex = _evalEjs[ctx.dataIndex];
              const s  = ctx.raw;
              const nv = s>=100?'Pro':s>=66?'Elite':s>=33?'Standard':'Bajo el estándar';
              return `${ex.valor} ${ex.unidad==='TIEMPO'?'seg':'reps'} — ${nv}`;
            }
          }
        }
      },
      scales: {
        r: {
          min:0, max:100,
          ticks: { stepSize:33, display:false },
          grid:        { color:'rgba(255,255,255,0.05)' },
          angleLines:  { color:'rgba(255,255,255,0.05)' },
          pointLabels: { font:{ size:9, family:'Instrument Sans', weight:'600' }, color:'#7a7b85' }
        }
      }
    }
  });
}

// ── Finalizar ─────────────────────────────────────────────────────
window._finalizarEvaluacion = async function(alumnoId) {
  if (!_evalEjs.length) return;
  const btn = document.getElementById('btnFinalizar');
  const msg = document.getElementById('evalMsg');
  if (btn) btn.disabled = true;
  if (msg) { msg.style.color='var(--muted)'; msg.textContent='Guardando...'; }

  try {
    const r1 = await fetchJSONP(
      APPS_SCRIPT_URL + '?action=crearEvaluacion&alumnoId=' + alumnoId +
      '&fecha=' + encodeURIComponent(new Date().toLocaleDateString('es-CL'))
    );
    if (r1.error) { if(msg){msg.style.color='var(--red)';msg.textContent='⚠ '+r1.error;} if(btn)btn.disabled=false; return; }

    const evalId = r1.evaluacionId;
    for (const ex of _evalEjs) {
      const p = [
        'action=guardarResultadoEval',
        'evaluacionId='  + evalId,
        'ejercicio='     + encodeURIComponent(ex.ejercicio),
        'unidad='        + encodeURIComponent(ex.unidad),
        'valor='         + ex.valor,
        'rangoStandard=' + ex.rangoStandard,
        'rangoElite='    + ex.rangoElite,
        'rangoPro='      + ex.rangoPro,
        'mayorEsMejor='  + ex.mayorEsMejor,
      ].join('&');
      await fetchJSONP(APPS_SCRIPT_URL + '?' + p);
    }

    if (msg) { msg.style.color='var(--teal)'; msg.textContent=`✓ Evaluación guardada (${_evalEjs.length} ejercicios)`; }
    _evalEjs = [];
    setTimeout(() => render(), 2000);
  } catch(e) {
    if (msg) { msg.style.color='var(--red)'; msg.textContent='⚠ '+e.message; }
    if (btn) btn.disabled = false;
  }
};

// ── Historial ─────────────────────────────────────────────────────
window._verHistorialEval = async function(alumnoId) {
  destroyCharts();
  document.getElementById('content').innerHTML = `
    <div class="form-view">
      <div class="form-header">
        <button class="btn-back" onclick="irAEvaluacion(${alumnoId})">← Volver</button>
        <div>
          <div class="form-title">${curPat.trim()}</div>
          <div class="form-sub">Historial de evaluaciones</div>
        </div>
      </div>
      <div class="card" style="margin:0 0 32px">
        <div id="historialContent" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">Cargando...</div>
      </div>
    </div>`;

  try {
    const evals = await fetchJSONP(APPS_SCRIPT_URL + '?action=getEvaluaciones&alumnoId=' + alumnoId);
    const el = document.getElementById('historialContent');
    if (!el) return;
    if (!Array.isArray(evals) || !evals.length) {
      el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted2)">Sin evaluaciones registradas</div>`;
      return;
    }
    el.innerHTML = evals.slice().reverse().map(ev => `
      <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:12px;font-weight:600">${ev.fecha}</span>
          <span style="font-size:9px;color:var(--muted2);font-family:'DM Mono',monospace">${ev.resultados.length} ejercicios</span>
        </div>
        ${ev.resultados.map(r => {
          const score = _normalizarValor(r.valor, r.rangoStandard, r.rangoElite, r.rangoPro, r.mayorEsMejor);
          const nivel = score===null?'—':score>=100?'PRO':score>=66?'ELITE':score>=33?'STD':'BAJO';
          const col   = score===null?'var(--muted2)':score>=100?'var(--orange)':score>=66?'var(--blue)':score>=33?'var(--lime)':'var(--red)';
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:10px;flex:1">${r.ejercicio}</span>
            <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--lime)">${r.valor}<span style="font-size:8px;color:var(--muted2);margin-left:2px">${r.unidad==='TIEMPO'?'seg':'reps'}</span></span>
            <span style="font-size:9px;font-family:'DM Mono',monospace;color:${col};font-weight:700;min-width:36px;text-align:right">${nivel}</span>
          </div>`;
        }).join('')}
      </div>`).join('');
  } catch(e) {
    const el = document.getElementById('historialContent');
    if (el) el.innerHTML = `<div style="color:var(--red)">⚠ ${e.message}</div>`;
  }
};

  document.getElementById('sidebar').classList.toggle('open');

}

function _checkMenuBtn() {
  const btn = document.getElementById('btn-menu');

}
window.addEventListener('resize', _checkMenuBtn);
_checkMenuBtn();

loadData();
</script>
